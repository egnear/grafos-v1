<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Vínculos - Investigação de Fraude</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e8eef4;
      background: radial-gradient(circle at top, #09101b 0%, #05070d 40%, #020305 100%);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: rgba(2, 10, 20, 0.82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .brand .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #38bdf8);
      box-shadow: 0 0 16px rgba(56, 189, 248, 0.35);
    }

    .subtitle {
      color: #a6b1c7;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 60ch;
    }

    #graph-container {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #network {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: radial-gradient(circle at center, rgba(17, 24, 39, 0.7), rgba(2, 8, 18, 0.95) 65%);
      overflow: hidden;
      border: 1px solid rgba(96, 165, 250, 0.08);
      box-shadow: inset 0 0 110px rgba(4, 10, 19, 0.8), 0 16px 60px rgba(0, 0, 0, 0.28);
    }

    #network::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.08), transparent 20%),
        radial-gradient(circle at 75% 25%, rgba(34, 197, 94, 0.06), transparent 18%),
        radial-gradient(circle at 50% 80%, rgba(239, 68, 68, 0.05), transparent 16%);
      pointer-events: none;
    }

    .legend {
      position: absolute;
      right: 1rem;
      bottom: 1rem;
      background: rgba(7, 14, 25, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      min-width: 230px;
      color: #d8e2f0;
      font-size: 0.95rem;
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(16px);
    }

    .legend h2 {
      margin-bottom: 0.75rem;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: #e2e8f0;
    }

    .legend-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.8rem;
      align-items: center;
      margin-bottom: 0.65rem;
    }

    .legend-item:last-child {
      margin-bottom: 0;
    }

    .legend-badge {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: 0 0 14px rgba(0, 0, 0, 0.28);
    }

    .badge-pessoa { background: #3b82f6; }
    .badge-dispositivo { background: #22c55e; }
    .badge-ip { background: #f59e0b; }
    .badge-cartao { background: #ef4444; }

    .legend-text {
      color: #cbd5e1;
    }

    @media (max-width: 720px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .legend {
        right: 0.75rem;
        left: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="brand">
        <span class="dot"></span>
        LinkMap Fraud Analysis
      </div>
      <p class="subtitle">Visualização interativa de vínculos com nós flutuantes e física orgânica, inspirada em redes neurais e clusters de fraudes.</p>
    </div>
    <div>
      <span style="font-size: 0.95rem; color: #8fa1c2;">Arraste os nós, use o scroll para aproximar e explore conexões suspeitas.</span>
    </div>
  </header>

  <main id="graph-container">
    <div id="network"></div>
    <aside class="legend">
      <h2>Legendas</h2>
      <div class="legend-item"><span class="legend-badge badge-pessoa"></span><span class="legend-text">Usuário / Conta</span></div>
      <div class="legend-item"><span class="legend-badge badge-dispositivo"></span><span class="legend-text">Dispositivo</span></div>
      <div class="legend-item"><span class="legend-badge badge-ip"></span><span class="legend-text">Endereço IP</span></div>
      <div class="legend-item"><span class="legend-badge badge-cartao"></span><span class="legend-text">Cartão de Crédito</span></div>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
